<!DOCTYPE html>
<html lang="ru">

  <head>
    <!--meta-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт, пет-проект для практики: html, css, js">
    <meta name="author" content="Kim Se-Un">
    <!--link-->
    <link rel="shortcut icon" href="images/logo/favicon.ico">
    <link rel="stylesheet" href="pages/index.css">
    <!--title-->
    <title>Mesto</title>
  </head>

  <body class="common">

    <div class="page">

      <header class="header">
        <img class="header__logo" src="images/logo/logo.svg" alt="логотип отошёл на 5 минут">
      </header>
      
      <main class="main">

        <section class="profile">

          <div class="profile__content">

            <img class="profile__avatar" src="images/image.jpg" alt="тут должно быть ваше изображение">

            <div class="profile__info">

              <h1 class="profile__full-name">Жак-Ив Кусто</h1>

              <p class="profile__description">Исследователь океана</p>

              <button class="profile__edit-button" name="edit-button" type="button" aria-label="Редактировать">
              </button>

            </div>

          </div>

          <button class="profile__add-button" name="add-button" type="button" aria-label="Добавить">
          </button>

        </section>

        <section class="elements">

        </section>
        
      </main>
      
      <footer class="footer">
        <p class="footer__text">&#169; 2020 Mesto Russia</p>
      </footer>
      
        <div class="popup">

          <div class="popup__container">
  
            <button class="popup__button-close" name="button-close" type="button" aria-label="Закрыть">
            </button>
  
            <form class="popup__form" name="form" action="blocks/popup/popup.js" method="get">
  
              <h2 class="popup__title">Редактировать профиль</h2>
  
              <input class="popup__input popup__input_value_name" name="name" type="text" placeholder="Введите Ваше имя" required>
  
              <input class="popup__input popup__input_value_job" name="job" type="text" placeholder="Укажите Вашу деятельность" required>
  
              <button class="popup__submit" name="submit" type="submit">Сохранить</button>
  
            </form>
            
          </div>

        </div>

        <div class="popup">

          <div class="popup__container">
  
            <button class="popup__button-close" name="button-close" type="button" aria-label="Закрыть">
            </button>
  
            <form class="popup__form" name="form" action="blocks/popup/popup.js" method="get">
  
              <h2 class="popup__title">Новое место</h2>
  
              <input class="popup__input popup__input_value_name" name="name" type="text" placeholder="Введите Ваше имя" required>
  
              <input class="popup__input popup__input_value_job" name="job" type="text" placeholder="Укажите Вашу деятельность" required>
  
              <button class="popup__submit" name="submit" type="submit">Создать</button>
  
            </form>
            
          </div>

        </div>
      
    </div>

    <template id="element-template">

      <article class="element">

        <img class="element__image" alt="тут была картинка">

        <div class="element__content">

          <h2 class="element__title"></h2>
          <button class="element__button element__button_active" name="like-btn" type="button" aria-label="Нравится">
          </button>

        </div>

      </article>

    </template>

    <script src="scripts/index.js"></script>
  </body>
</html>
