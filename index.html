<!DOCTYPE html>
<html lang="ru">

  <head>
    <!--meta-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Сайт, пет-проект для практики: html, css, js">
    <meta name="author" content="Kim Se-Un">
    <!--link-->
    <link rel="shortcut icon" href="images/logo/favicon.ico">
    <link rel="stylesheet" href="pages/index.css">
    <!--title-->
    <title>Mesto</title>
  </head>

  <body class="common">

    <div class="page">

      <header class="header">
        <img class="header__logo" src="images/logo/logo.svg" alt="логотип отошёл на 5 минут">
      </header>
      
      <main class="main">

        <section class="profile">

          <div class="profile__content">

            <img class="profile__avatar" src="images/image.jpg" alt="тут должно быть ваше изображение">

            <div class="profile__info">

              <h1 class="profile__full-name">Жак-Ив Кусто</h1>

              <p class="profile__description">Исследователь океана</p>

              <button class="profile__edit-button" name="edit-button" type="button">
                <img class="profile__edit-logo" src="images/logo/Vector.svg" alt="тут была картинка">
              </button>

            </div>

          </div>

          <button class="profile__add-button">
            <img class="profile__add-logo" src="images/logo/plus.svg" alt="тут была картинка">
          </button>

        </section>

        <section class="popup">

          <div class="popup__container">

            <button class="popup__button-close">
              <img class="popup__button-logo" src="images/logo/close.png" alt="тут была картинка">
            </button>

            <form class="popup__form" action="blocks/popup/popup.js">

              <h2 class="popup__title">Редактировать профиль</h2>

              <input class="popup__fullname" type="text" placeholder="Жак-Ив Кусто">
              <div class="popup__line"></div>
              <input class="popup__description" type="text" placeholder="Исследователь океана">
              <div class="popup__line"></div>
              <button class="popup__button-save">Сохранить</button>

            </form>
            
          </div>

        </section>

        <section class="elements">

          <article class="element">

            <img class="element__image" src="images/image0.jpg" alt="тут была картинка">

            <div class="element__content">

              <h2 class="element__title">Карачаевск</h2>
              <button class="element__button element__button_active"><img class="element__button-logo" src="images/logo/Group.svg" alt="тут была картинка">
              </button>

            </div>

          </article>

          <article class="element">

            <img class="element__image" src="images/image1.jpg" alt="тут была картинка">

            <div class="element__content">

              <h2 class="element__title">Гора Эльбрус</h2>
              <button class="element__button element__button_active"><img class="element__button-logo" src="images/logo/Group.svg" alt="тут была картинка">
              </button>

            </div>

          </article>

          <article class="element">

            <img class="element__image" src="images/image2.jpg" alt="тут была картинка">

            <div class="element__content">

              <h2 class="element__title">Домбай</h2>
              <button class="element__button element__button_active"><img class="element__button-logo" src="images/logo/Group.svg" alt="тут была картинка">
              </button>

            </div>

          </article>

          <article class="element">

            <img class="element__image" src="images/image3.jpg" alt="тут была картинка">

            <div class="element__content">

              <h2 class="element__title">Камень в пустыне</h2>
              <button class="element__button element__button_active"><img class="element__button-logo" src="images/logo/Group.svg" alt="тут была картинка">
              </button>

            </div>

          </article>

          <article class="element">
            <img class="element__image" src="images/image4.jpg" alt="тут была картинка">

            <div class="element__content">

              <h2 class="element__title">Хвойный Лес</h2>
              <button class="element__button element__button_active"><img class="element__button-logo" src="images/logo/Group.svg" alt="тут была картинка">
              </button>

            </div>

          </article>

          <article class="element">
            <img class="element__image" src="images/image5.jpg" alt="тут была картинка">

            <div class="element__content">

              <h2 class="element__title">Звездное небо</h2>
              <button class="element__button element__button_active"><img class="element__button-logo" src="images/logo/Group.svg" alt="тут была картинка">
              </button>

            </div>

          </article>

        </section>
        
      </main>
      
      <footer class="footer">
        <p class="footer__text">&#169; 2020 Mesto Russia</p>
      </footer>

    </div>

    <script src="blocks/popup/popup.js"></script>
  </body>
</html>
